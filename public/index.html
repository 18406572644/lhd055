<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我去过的地方 · 旅行足迹地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>

  <div id="stats-panel" class="collapsed">
    <div class="stats-header">
      <h2>旅行统计</h2>
      <button id="stats-toggle" title="展开/收起详细统计">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
    </div>
    <div class="stats-basic">
      <div class="stat-item">
        <span class="stat-value" id="stat-total">0</span>
        <span class="stat-label">足迹总数</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-days">0</span>
        <span class="stat-label">旅行天数</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-cities">0</span>
        <span class="stat-label">到访城市</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-countries">0</span>
        <span class="stat-label">国家/地区</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-provinces">0</span>
        <span class="stat-label">省份/州</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-month">暂无</span>
        <span class="stat-label">最爱月份</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-distance">0</span>
        <span class="stat-label">最远距离(km)</span>
      </div>
    </div>
    <div class="stats-expanded">
      <div class="stats-section">
        <h3>心情分布</h3>
        <div class="chart-row">
          <div class="chart-container">
            <canvas id="mood-pie-chart" width="200" height="200"></canvas>
          </div>
          <div class="mood-legend" id="mood-legend"></div>
        </div>
      </div>
      <div class="stats-section">
        <h3>全年旅行趋势</h3>
        <div class="chart-container bar-chart-container">
          <canvas id="monthly-bar-chart" width="360" height="160"></canvas>
        </div>
      </div>
      <div class="stats-section">
        <h3>年度对比</h3>
        <div class="yearly-card" id="yearly-card"></div>
      </div>
    </div>
  </div>

  <button id="trips-toggle" title="我的旅行">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M2 12h2l2-5 3 10 3-7 2 4h8"/>
      <circle cx="12" cy="12" r="0" fill="currentColor"/>
    </svg>
  </button>

  <button id="timeline-toggle" title="足迹时间线">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="4" x2="21" y2="4"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="20" x2="21" y2="20"/>
      <circle cx="8" cy="4" r="2" fill="currentColor"/><circle cx="16" cy="12" r="2" fill="currentColor"/><circle cx="10" cy="20" r="2" fill="currentColor"/>
    </svg>
  </button>

  <div id="trips-drawer" class="closed">
    <div class="drawer-header">
      <h2>我的旅行</h2>
      <div class="drawer-actions">
        <button id="trip-create-btn" class="btn-small">+ 新建旅行</button>
        <button id="trips-close">&times;</button>
      </div>
    </div>
    <div id="trips-list"></div>
  </div>

  <div id="timeline-drawer" class="closed">
    <div class="drawer-header">
      <h2>足迹时间线</h2>
      <div class="drawer-actions">
        <button id="timeline-toggle-mode" class="btn-small">按旅行</button>
        <button id="timeline-close">&times;</button>
      </div>
    </div>
    <div id="timeline-list"></div>
  </div>

  <div id="trip-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h3 id="trip-modal-title">创建旅行</h3>
      <form id="trip-form">
        <div class="form-group">
          <label for="trip-name">旅行名称</label>
          <input type="text" id="trip-name" required placeholder="例如：2024 日本关西之旅">
        </div>
        <div class="form-group">
          <label for="trip-start-date">开始日期</label>
          <input type="date" id="trip-start-date">
        </div>
        <div class="form-group">
          <label for="trip-end-date">结束日期</label>
          <input type="date" id="trip-end-date">
        </div>
        <div class="form-group">
          <label for="trip-description">旅行描述</label>
          <textarea id="trip-description" rows="3" placeholder="记录这次旅行的故事..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" id="trip-cancel" class="btn-cancel">取消</button>
          <button type="submit" class="btn-submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div id="trip-detail-drawer" class="closed">
    <div class="drawer-header trip-detail-header">
      <button id="trip-detail-back" class="btn-back">← 返回</button>
      <h2 id="trip-detail-title">旅行详情</h2>
      <button id="trip-detail-close">&times;</button>
    </div>
    <div id="trip-detail-content"></div>
  </div>

  <div id="route-animation-controls" class="hidden">
    <div class="animation-controls">
      <button id="animation-play" title="播放/暂停">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
      </button>
      <button id="animation-reset" title="重置">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
        </svg>
      </button>
      <div class="speed-control">
        <label>速度</label>
        <select id="animation-speed">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="2">2x</option>
          <option value="5">5x</option>
        </select>
      </div>
    </div>
  </div>

  <div id="add-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h3>添加足迹</h3>
      <form id="add-form">
        <div class="form-group">
          <label for="fp-name">地点名称</label>
          <input type="text" id="fp-name" required placeholder="例如：京都岚山">
        </div>
        <div class="form-group">
          <label for="fp-date">到访日期</label>
          <input type="date" id="fp-date" required>
        </div>
        <div class="form-group">
          <label for="fp-feeling">一句话感受</label>
          <input type="text" id="fp-feeling" placeholder="写下你的感受...">
        </div>
        <div class="form-group">
          <label>心情评分</label>
          <div class="star-rating" id="star-rating">
            <span data-value="1">★</span>
            <span data-value="2">★</span>
            <span data-value="3">★</span>
            <span data-value="4">★</span>
            <span data-value="5">★</span>
          </div>
        </div>
        <div class="form-group">
          <label>旅行照片</label>
          <div id="upload-area" class="upload-area">
            <input type="file" id="image-input" accept="image/*" multiple hidden>
            <div class="upload-hint">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <p>拖拽图片到此处，或<u>点击选择</u></p>
              <small>支持 JPG、PNG、GIF、WebP，单张最多 10MB</small>
            </div>
            <div id="upload-preview" class="upload-preview"></div>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" id="add-cancel" class="btn-cancel">取消</button>
          <button type="submit" class="btn-submit">添加足迹</button>
        </div>
      </form>
    </div>
  </div>

  <div id="detail-popup" class="hidden">
    <button id="detail-close">&times;</button>
    <h3 id="detail-name"></h3>
    <div id="detail-gallery" class="detail-gallery hidden"></div>
    <div class="detail-row">
      <span class="detail-icon">📅</span>
      <span id="detail-date"></span>
    </div>
    <div class="detail-row">
      <span class="detail-icon">💬</span>
      <span id="detail-feeling"></span>
    </div>
    <div class="detail-row">
      <span class="detail-icon">⭐</span>
      <span id="detail-mood"></span>
    </div>
    <div class="detail-upload hidden">
      <div class="detail-upload-area" id="detail-upload-area">
        <input type="file" id="detail-image-input" accept="image/*" multiple hidden>
        <span class="detail-upload-hint">+ 添加图片</span>
      </div>
    </div>
    <button id="detail-delete" class="btn-delete">删除此足迹</button>
  </div>

  <div id="lightbox" class="lightbox hidden">
    <button class="lightbox-close" id="lightbox-close">&times;</button>
    <button class="lightbox-prev" id="lightbox-prev">&#10094;</button>
    <button class="lightbox-next" id="lightbox-next">&#10095;</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="">
    </div>
    <button class="lightbox-delete" id="lightbox-delete">删除图片</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
